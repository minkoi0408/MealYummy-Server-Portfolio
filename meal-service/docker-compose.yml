
services:
  redis:
    image: redis:7-alpine
    container_name: mealyummy_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mealyummy_backend
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      # Override REDIS_HOST from .env to point to the redis container
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      # Mount .env so spring-dotenv can find it if needed
      - ./.env:/app/.env
