server:
  port: ${SERVER_PORT}

spring:
  config:
    import: optional:file:.env[.properties]
  mongodb:
    uri: ${MONGODB_URI}
  application:
    name: meal-service

  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    web:
      pageable:
        serialization-mode: via_dto
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
    mongodb:
      auto-index-creation: true

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.ssl.trust: ${MAIL_HOST:smtp-relay.brevo.com}

logging:
  level:
    org.springframework.security: DEBUG
    mealyummy.mealservice.core.security: DEBUG
    org.springframework.web.cors: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
    mealyummy.mealservice: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    default-models-expand-depth: -1
  api-docs:
    path: /api-docs
  packagesToScan: mealyummy.mealservice.controller

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION}

# OTP Configuration
app:
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES}
  client-url: ${CLIENT_URL:http://localhost:5173}

gemini:
  api:
    key: ${GEMINI_API_KEY}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# Resend Email Service (Modern alternative to SMTP)
resend:
  enabled: ${RESEND_ENABLED:false}
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:MealYummy <onboarding@resend.dev>}

# Payment Gateway Configurations
payment:
  payos:
    client-id: ${PAYOS_CLIENT_ID}
    api-key: ${PAYOS_API_KEY}
    checksum-key: ${PAYOS_CHECKSUM_KEY}
    return-url: ${APP_URL:http://localhost:8082}/api/v1/payments/payos-return
    cancel-url: ${APP_URL:http://localhost:8082}/api/v1/payments/payos-cancel


