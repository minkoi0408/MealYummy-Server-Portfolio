server:
  port: 8082

spring:
  mongodb:
    uri: mongodb+srv://meal-yummy:bIQd8G5njQmHR3LZ@meal-yummy.s6abq8j.mongodb.net/meal-service
  application:
    name: meal-service

  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true

  data:
    web:
      pageable:
        serialization-mode: via_dto

logging:
