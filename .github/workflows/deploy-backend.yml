name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Spring Boot JAR
        run: |
          cd meal-service
          mvn clean package -DskipTests

      - name: Create Env File
        run: |
          cat << EOF > .env
          ${{ secrets.PROD_ENV_FILE }}
          EOF

      - name: Copy Files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "meal-service/target/meal-service-0.0.1-SNAPSHOT.jar,meal-service/Dockerfile.backend,docker-compose.yml,.env"
          target: "/root/meal-yummi"
          strip_components: 1

      - name: Restart Backend Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/meal-yummi
            # Rename the copied files if they were stripped strangely
            mv target/meal-service-0.0.1-SNAPSHOT.jar . 2>/dev/null || true
            mv Dockerfile.backend . 2>/dev/null || true
            rm -rf target meal-service
            docker compose up -d --build backend
