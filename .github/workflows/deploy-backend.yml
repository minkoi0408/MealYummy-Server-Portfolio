name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy Backend
        run: |
          VPS_HOST=$(printf '%s' "${{ secrets.VPS_HOST }}" | tr -d '[:space:]')
          VPS_USER=$(printf '%s' "${{ secrets.VPS_USERNAME }}" | tr -d '[:space:]')
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${VPS_USER}@${VPS_HOST} \
            "cd ~/mealyummy-server && git pull origin main && docker compose up -d --build backend && docker image prune -f"
