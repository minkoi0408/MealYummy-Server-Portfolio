version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: mealyummy_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - mealyummy-net

  backend:
    build:
      context: ./meal-service
      dockerfile: Dockerfile.backend
    container_name: mealyummy_backend
    ports:
      - "127.0.0.1:8082:8082"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - mealyummy-net

  frontend:
    build:
      context: ./client/client
      dockerfile: Dockerfile.frontend
    container_name: mealyummy_frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mealyummy-net

networks:
  mealyummy-net:
    driver: bridge
