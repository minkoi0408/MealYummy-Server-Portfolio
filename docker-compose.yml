version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: mealyummy_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - mealyummy-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mealyummy_backend
    ports:
      - "8082:8082"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - mealyummy-net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.frontend
    container_name: mealyummy_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mealyummy-net

networks:
  mealyummy-net:
    driver: bridge
